id: "01_intake_demanda_prpi"
owner: "prpi-orchestrator"
objective: "Identificar o tipo de demanda da PRPI (edital de fomento, acompanhamento de bolsas ou produção científica/prestação de contas), inventariar documentos disponíveis e lacunas bloqueantes antes de rotear para o workflow adequado."
inputs:
  - "solicitação inicial (templates/solicitacao_demanda_prpi.yaml)"
  - "documentos disponíveis: minuta de edital, propostas submetidas, dados de bolsas, produção científica do período, planos de aplicação de convênios/parcerias"
outputs:
  - "relatorio_intake com tipo de demanda identificado, documentos presentes, lacunas e workflow recomendado"
acceptance_criteria:
  - "demanda classificada em um dos três workflows (ciclo_edital_fomento, acompanhamento_bolsas, producao_e_prestacao_contas) com justificativa"
  - "toda lacuna bloqueante formulada como pergunta objetiva ao usuário"
  - "nenhum dado inventado: lacuna vira pergunta ou premissa explícita confirmada pelo usuário"
