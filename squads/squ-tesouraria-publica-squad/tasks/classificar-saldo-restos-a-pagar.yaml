id: classificar-saldo-restos-a-pagar
description: Classificar saldos e restos a pagar processados/não processados, com alertas de prazo.
assigned_agent: analista-execucao-sipac
dependencies:
- consolidar-execucao-orcamentaria
input_schema:
  type: object
  required:
  - source
  - reference_date
  properties:
    source:
      type: string
    reference_date:
      type: string
    records:
      type: array
    human_review_required:
      type: boolean
  additionalProperties: true
  title: classificar-saldo-restos-a-pagar input
output_schema:
  type: object
  required:
  - status
  - human_review_required
  properties:
    status:
      type: string
    human_review_required:
      const: true
    issues:
      type: array
    outputs:
      type: array
validation_rules:
- validar schema de entrada
- registrar origem e data de referência
- marcar campos ausentes como dado_incompleto
- não emitir decisão final
timeout: 120s
retry_policy:
  max_attempts: 2
  retry_on:
  - erro de parsing
  - arquivo temporariamente indisponível
  do_not_retry_on:
  - schema inválido
  - ausência de dado obrigatório
human_approval: true
failure_behavior: Gerar relatório de bloqueio com dados faltantes, sem fabricar evidências ou valores.
quality_criteria:
- Consolidar dotação, empenhado, liquidado, pago e saldos por chave orçamentária.
- Calcular percentuais de execução e classificar restos a pagar processados e não processados.
- saída auditável e revisável
