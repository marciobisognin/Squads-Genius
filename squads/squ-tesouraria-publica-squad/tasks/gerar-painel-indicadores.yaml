id: gerar-painel-indicadores
description: Gerar painel e leitura executiva de indicadores PDI/TCU.
assigned_agent: painel-indicadores
dependencies:
- consolidar-execucao-orcamentaria
input_schema:
  type: object
  required:
  - source
  - reference_date
  properties:
    source:
      type: string
    reference_date:
      type: string
    records:
      type: array
    human_review_required:
      type: boolean
  additionalProperties: true
  title: gerar-painel-indicadores input
output_schema:
  type: object
  required:
  - status
  - human_review_required
  properties:
    status:
      type: string
    human_review_required:
      const: true
    issues:
      type: array
    outputs:
      type: array
validation_rules:
- validar schema de entrada
- registrar origem e data de referência
- marcar campos ausentes como dado_incompleto
- não emitir decisão final
timeout: 120s
retry_policy:
  max_attempts: 2
  retry_on:
  - erro de parsing
  - arquivo temporariamente indisponível
  do_not_retry_on:
  - schema inválido
  - ausência de dado obrigatório
human_approval: true
failure_behavior: Gerar relatório de bloqueio com dados faltantes, sem fabricar evidências ou valores.
quality_criteria:
- Compilar indicadores de gestão alinhados ao PDI e aos indicadores de IFs.
- Comparar execução orçamentária com metas e apontar desvios documentados.
- saída auditável e revisável
