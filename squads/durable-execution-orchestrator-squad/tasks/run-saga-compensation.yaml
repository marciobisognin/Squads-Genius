id: run-saga-compensation
description: Executar compensações em ordem inversa
assigned_agent: worker-runtime-engineer
dependencies:
- execute-durable-instance
input_schema:
  workflow_instance: object
  configuration: object
  evidence: object
output_schema:
  status: string
  result: object
  events: array
validation_rules:
- compensações registradas
- ordem inversa preservada
- falhas de compensação auditadas
timeout: 300s
retry_policy:
  max_attempts: 3
  backoff: exponential
  retry_on:
  - transient_error
  - rate_limit
  - worker_restart
  stop_on:
  - validation_error
  - permission_denied
  - human_rejection
human_approval: false
failure_behavior: Persistir evento de falha, preservar checkpoint e acionar compensação
  quando houver efeito colateral.
