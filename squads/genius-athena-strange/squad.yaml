# Squad: Genius Athena-Strange
# Framework de Antifragilidade, Análise de Cisne Negro & Tomada de Decisão sob Incerteza
# Inspirado nos frameworks de Nassim Nicholas Taleb

name: Genius Athena-Strange
version: 1.0.0
description: "Squad de análise de risco, antifragilidade e tomada de decisão sob incerteza radical. Emula os frameworks de Nassim Nicholas Taleb — Cisne Negro, Antifragilidade, Estratégia Barbell, Via Negativa e Opcionalidade — para avaliar sistemas, projetos e decisões."
author: marciobisognin
license: MIT
slashPrefix: gas

aios:
  minVersion: "2.1.0"
  compatibility: full

components:
  agents:
    - agents/cygnus-vidente.md
    - agents/hydra-arquiteta.md
    - agents/seneca-estrategista.md
    - agents/medusa-auditora.md
    - agents/hermes-orquestrador.md
  tasks:
    - tasks/mapear-cisnes-negros.md
    - tasks/projetar-antifragilidade.md
    - tasks/aplicar-barbell.md
    - tasks/auditar-fragilidade.md
    - tasks/sintetizar-relatorio.md
  workflows:
    - workflows/taleb-pipeline.yaml
  config:
    - config/coding-standards.md
    - config/tech-stack.md
    - config/source-tree.md
  checklists:
    - checklists/fragility-gate.md
  templates:
    - templates/barbell-template.md

config:
  inherit: true
  language: pt-BR
  naming: kebab-case

tags:
  - risk-analysis
  - antifragility
  - black-swan
  - decision-making
  - uncertainty
  - taleb
  - barbell-strategy
  - via-negativa
  - optionality
