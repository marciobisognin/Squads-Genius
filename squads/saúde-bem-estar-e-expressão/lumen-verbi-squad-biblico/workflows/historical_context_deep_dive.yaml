id: historical_context_deep_dive
description: Foco em contexto historico/cultural/textual, acionando historiadores e critico textual.
human_in_loop: true
rollback: retornar ao gate de guardrails
steps:
  - order: 1
    name: intake
    task: 01_intake_consulta
  - order: 2
    name: analise_pln
    task: 02_analise_pln_entidades_intencao
  - order: 3
    name: recuperar_bdc
    task: 03_recuperar_contexto_bdc
  - order: 4
    name: selecionar
    task: 04_selecionar_combinar_agentes
    gate: "ao menos um historiador acionado"
  - order: 5
    name: contexto_historico
    task: 06_complementar_contexto_historico
  - order: 6
    name: compor_resposta
    task: 07_compor_resposta_final
  - order: 7
    name: guardrails
    task: 08_revisao_teologica_guardrails
    gate: "go_no_go == go"
