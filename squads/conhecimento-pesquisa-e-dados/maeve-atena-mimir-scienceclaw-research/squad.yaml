  - agents/hugin-synthesis-writer.md
  - agents/freya-delivery-editor.md
  - agents/gaia-article-architect.md
  - agents/calliope-academic-writer.md
  - agents/minerva-peer-reviewer.md
  - agents/tyr-integrity-auditor.md
  - agents/themis-format-disclosure.md
  tasks:
