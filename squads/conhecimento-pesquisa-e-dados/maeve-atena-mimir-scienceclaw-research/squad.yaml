  - tasks/11-redigir-manuscrito.md
  - tasks/12-revisao-pares-simulada.md
  - tasks/13-auditoria-integridade-final.md
  - tasks/14-formatar-entrega-artigo.md
  workflows:
  - workflows/scienceclaw-research-pipeline.yaml
  - workflows/academic-article-pipeline.yaml
  checklists:
