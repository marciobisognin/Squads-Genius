  - tasks/02-planejar-busca.md
  - tasks/03-coletar-evidencias.md
  - tasks/04-verificar-citacoes.md
  - tasks/05-analisar-metodo.md
  - tasks/06-sintetizar-achados.md
  - tasks/07-redigir-relatorio.md
