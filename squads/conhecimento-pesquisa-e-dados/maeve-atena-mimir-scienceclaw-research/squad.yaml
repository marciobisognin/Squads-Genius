name: maeve-atena-mimir
slug: maeve-atena-mimir-scienceclaw-research
display_name: Maeve Atena Mimir
subtitle: ScienceClaw Research + Scientific Article Pipeline
version: 1.1.0
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
readme_style: parchment-goal-flow
language: pt-BR
runtime: Hermes / Maeve / OpenSquad
source_inspiration:
  scienceclaw:
    repository: https://github.com/beita6969/ScienceClaw
    integration_mode: adaptação autoral MIT
  academic_research_skills:
    repository: https://github.com/Imbad0202/academic-research-skills
    author: Cheng-I Wu
    upstream_license: CC BY-NC 4.0
    integration_mode: |-
      adaptação metodológica limpa; sem cópia de arquivos, prompts, templates, scripts ou comandos
purpose: |
  Realizar pesquisa científica profunda, revisão bibliográfica, verificação de citações, síntese crítica, escrita de artigos científicos, revisão por pares simulada e auditoria final de integridade acadêmica em português técnico.
