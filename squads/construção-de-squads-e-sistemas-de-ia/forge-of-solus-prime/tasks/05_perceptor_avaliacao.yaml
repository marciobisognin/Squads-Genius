id: 05_perceptor_avaliacao
act: praxis
assigned_agent: "PERCEPTOR"
description: >
  Pontuar as candidatas com o motor determinístico (Decimal) e decidir incorporate/adapt/reject/watch.
dependencies:
  - "04_jazz_pesquisa"
inputs:
  - "tool_candidates.json"
outputs:
  - "tool_evaluation.json"
validation_rules:
  - "score em Decimal com pesos canônicos"
  - "risco alto => reject automático"
retry_policy:
  max_attempts: 2
  stop_on_same_failure: 2
human_approval: false
failure_behavior: retry
cost_ceiling:
  tokens: 30000
  tool_calls: 10

