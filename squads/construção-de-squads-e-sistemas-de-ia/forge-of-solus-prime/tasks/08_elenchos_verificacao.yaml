id: 08_elenchos_verificacao
act: elenchos
assigned_agent: "HOIST"
description: >
  Refutar 'pronto': rodar testes, validar schemas, abrir arquivos e anexar evidência verificável.
dependencies:
  - "07_praxis_geracao"
inputs:
  - "artefatos do squad gerado"
outputs:
  - "relatório de validação"
  - "evidência anexada"
validation_rules:
  - "teste verde / schema válido / arquivo conferido"
  - "sem evidência => falha"
retry_policy:
  max_attempts: 2
  stop_on_same_failure: 2
human_approval: false
failure_behavior: retry
cost_ceiling:
  tokens: 30000
  tool_calls: 10

