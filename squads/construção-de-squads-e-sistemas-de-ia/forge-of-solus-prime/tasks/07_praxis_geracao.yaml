id: 07_praxis_geracao
act: praxis
assigned_agent: "IRONHIDE"
description: >
  Executar as microtarefas permitidas e gerar os artefatos do squad (agentes, scripts, docs) em modo report-only.
dependencies:
  - "06_grapple_arquitetura"
inputs:
  - "arquitetura"
  - "microtarefas"
outputs:
  - "artefatos do squad gerado"
  - "run_state.json (spans)"
validation_rules:
  - "artefato + log + custo por microtarefa"
  - "L1 não altera fonte de verdade"
retry_policy:
  max_attempts: 2
  stop_on_same_failure: 2
human_approval: false
failure_behavior: retry
cost_ceiling:
  tokens: 30000
  tool_calls: 10

