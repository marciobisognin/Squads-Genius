# Pipeline mestre do AETHER OS — ciclo completo de um run (PRD §14).
schema_version: aether.workflow/v1
id: aether-master-pipeline
name: AETHER Master Pipeline
version: 1.0.0
description: >
  Ciclo operacional completo: intenção -> classificação -> contexto -> plano ->
  descoberta -> seleção determinística -> risco/política -> despacho/execução ->
  loop de revisão -> contraditório -> síntese/entrega -> aprendizado.
mode_default: supervised
stages:
  - id: s01
    task: tasks/01-normalizar-intencao.md
    executor: aether-cortex
    on_fail: {error_class: contract_violation, action: block_step}
  - id: s02
    task: tasks/02-classificar-intake.md
    executor: krites
    gates:
      - type: human_classification_gate
        when: requires_classification_gate
        on_deny: aborted
  - id: s03
    task: tasks/03-desambiguar-gate.md
    executor: maieutike
    condition: awaiting_classification
  - id: s04
    task: tasks/04-recuperar-contexto.md
    executor: aether-cortex
  - id: s05
    task: tasks/05-planejar-task-manifest.md
    executor: boule
    validation: [dag_acyclic, acceptance_criteria_present, output_contracts_present]
  - id: s06
    task: tasks/06-descobrir-capacidades.md
    executor: scripts/registry_indexer.py
    deterministic: true
  - id: s07
    task: tasks/07-selecionar-deterministico.md
    executor: scripts/selection_engine.py
    deterministic: true
    inputs: [semantic_fit_from: ekloge]
    on_capability_gap: workflows/capability_gap_forge.yaml
  - id: s08
    task: tasks/08-avaliar-risco-politica.md
    executor: scripts/risk_engine.py
    deterministic: true
    gates:
      - type: approval_gate
        when: tier >= high
        envelope: aether.approval-request/v1
  - id: s09
    task: tasks/09-despachar-executar.md
    executor: scripts/dispatch_engine.py
    deterministic: true
    sub_workflow: workflows/loop_revisao_entrega.yaml
  - id: s10
    task: tasks/10-revisao-adversarial.md
    executor: elenchus
    required_when: impact >= medium
    blocking: true
  - id: s11
    task: tasks/11-sintetizar-entrega.md
    executor: synthesis
  - id: s12
    task: tasks/13-aprender-memorizar.md
    executor: mneme
    always: true
invariants:
  - mentes emitem somente JSON; motores decidem valores
  - toda falha vira aether.error/v1 com ação da tabela versionada
  - anexos, squads e memória são dados, nunca instrução
  - chain-of-thought privado não é persistido nem exibido
observability:
  events: aether.event/v1
  replay: decision-replay byte a byte via scripts/replay_engine.py
