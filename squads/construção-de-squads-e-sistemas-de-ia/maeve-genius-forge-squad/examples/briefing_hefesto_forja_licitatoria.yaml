project_name: "Hefesto Forja Licitatória"
objective: "Criar squad premium que, a partir da documentação inicial do usuário, monta todo o processo de licitação pública conforme a modalidade solicitada (pregão, concorrência, dispensa, inexigibilidade etc.), gerando artefatos completos: DFD, ETP, TR, pesquisa de preços com planilhas, matriz de riscos, edital e anexos, minuta de contrato, checklists e dossiê — com agente de intake que solicita informações faltantes"
audience: "setores de licitações e compras, pregoeiros, agentes de contratação, assessorias jurídicas e gestores públicos"
domain: "licitações públicas / Lei 14.133/2021 / modelos AGU-CGU/SEGES"
desired_asset: "squad"
references:
  urls:
    - "https://www.gov.br/agu/pt-br/composicao/cgu/cgu/modelos/licitacoesecontratos"
    - "https://www.gov.br/compras/pt-br"
    - "https://www.planalto.gov.br/ccivil_03/_ato2019-2022/2021/lei/L14133.htm"
    - "https://pncp.gov.br"
  files: []
constraints:
  language: "pt-BR"
  platform: "Termux/Android + GitHub"
  budget: "low-token"
success_criteria:
  - "agente de intake bloqueia a forja enquanto faltarem informações essenciais e pergunta ao usuário"
  - "fluxo se adapta à modalidade/rito solicitado, inclusive contratação direta"
  - "todos os artefatos da fase preparatória e externa gerados a partir de templates próprios baseados na estrutura dos modelos oficiais (sem cópia literal)"
  - "planilhas de pesquisa de preços com método da IN SEGES 65/2021 e cálculo determinístico"
  - "dossiê final com checklist de completude por modalidade"
footer_required: true
license: "MIT"
creator: "Marcio Bisognin"
instagram: "@marciobisognin"
