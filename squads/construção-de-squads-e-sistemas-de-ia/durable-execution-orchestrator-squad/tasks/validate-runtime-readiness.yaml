id: validate-runtime-readiness
description: Validar prontidão operacional do runtime
assigned_agent: devops-release-engineer
dependencies:
- register-versioned-workflow
- execute-durable-instance
- manage-human-signal-gate
- run-saga-compensation
- emit-observability-events
input_schema:
  workflow_instance: object
  configuration: object
  evidence: object
output_schema:
  status: string
  result: object
  events: array
validation_rules:
- pytest aprovado
- run-example aprovado
- quality_report go
timeout: 300s
retry_policy:
  max_attempts: 3
  backoff: exponential
  retry_on:
  - transient_error
  - rate_limit
  - worker_restart
  stop_on:
  - validation_error
  - permission_denied
  - human_rejection
human_approval: true
failure_behavior: Persistir evento de falha, preservar checkpoint e acionar compensação
  quando houver efeito colateral.
