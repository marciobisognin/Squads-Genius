id: 10_hitl_gate_b_homologacao
description: "HITL Gate B: homologação humana final da peça redigida."
assigned_agent: scriba-orchestrator
dependencies: [09_validar_conformidade]
inputs:
  - draft_clauses
  - relatorio_validacao
  - premissas e fontes (legal_refs, calc_results)
outputs:
  - decisao_homologacao (aprovar | ajustar | rejeitar)
  - registro_homologacao (autor, data, decisão)
acceptance_criteria:
  - "Nenhuma peça marcada 'final' sem registro de homologação humana."
  - "Ajuste reexecuta o pipeline com novo parâmetro."
  - "Rejeição registra justificativa."
validation_rules:
  - "registro_homologacao presente antes de gerar o pacote final"
  - "sem publicação/integração externa sem homologação"
human_approval: true
failure_behavior: "manter status não-final e devolver ao fluxo com a justificativa"
