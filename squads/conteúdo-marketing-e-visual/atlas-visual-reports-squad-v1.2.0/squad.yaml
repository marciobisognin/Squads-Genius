description: |-
  Squad multiagente para transformar relatórios pré-preenchidos em experiências premium HTML/PDF com camadas executiva visual, analítica visual e apêndice técnico auditável.
metadata:
  readme_visual_preset: dark-neon-layered-architecture
  default_pdf_format: A4 portrait
  mvp: MVP 2 — PRD operationalized with modular HTML/PDF/QA pipeline
  brd_source: references/prd/BRD_squad_design_relatorios_premium.md
  preferred_stack: HTML5 + CSS Grid/Flexbox + SVG + Python local builders
  output_contract:
  - index.html
  - styles.css
  - assets when needed
  - PDF A4 portrait or landscape
  - visual specification
  - QA reports
  report_layers:
  - executive visual layer
  - analytical visual layer
  - technical appendix
  added_layers:
  - design contracts
  - separated HTML builder
  - separated PDF builder
  - PDF validator
  - print-safe template kit
  - template library foundation
  - audit evidence quality
  - compliance reporting
  - internal controls
  - risk heatmap and materiality
  - cyber/privacy assurance
  - tax/regulatory review
  - forensic red flags
  - strategy coherence
  - technology/digital controls
  - red team review
