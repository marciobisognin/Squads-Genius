name: "nirvana-readme-architect"
version: "1.1.0-maeve"
description: "Squad de geração de README.md profissional, agora em edição hardened Maeve com CLI operacional, smoke test local, comandos universais e empacotamento npm."
author: "Synkra AIOS"
license: MIT
slashPrefix: "nra"

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - "nra-orchestrator.md"
    - "nra-codebase-analyzer.md"
    - "nra-content-architect.md"
    - "nra-quality-validator.md"
    - "nra-polisher.md"
  tasks:
    - "nra-orchestrator-parse-request.md"
    - "nra-codebase-analyzer-scan-project.md"
    - "nra-content-architect-select-template.md"
    - "nra-content-architect-generate-sections.md"
    - "nra-quality-validator-validate-readme.md"
    - "nra-polisher-enhance-readme.md"
    - "nra-orchestrator-deliver.md"
  workflows:
    - "readme-generation-pipeline.yaml"
  checklists:
    - "readme-quality.md"
  templates:
    - "nirvana-readme.md"
  tools: []
  scripts:
    - "readme-architect.cjs"
    - "smoke-test.cjs"

config:
  extends: none
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

dependencies:
  node: []
  python: []
  squads: []

mcpTools:
  required: []
  optional:
    - "lsp_document_symbols": "Análise de símbolos do codebase para seção de arquitetura"
    - "lsp_workspace_symbols": "Busca de símbolos no workspace para mapeamento de entry points"

tags:
  - "readme"
  - "documentation"
  - "github-markdown"
  - "codebase-analysis"
  - "template-generation"

metadata:
  hardened_by: "Maeve/Hermes"
  hardening_version: "1.1.0-maeve"
  original_author_preserved: "Synkra AIOS"
