project_name: "atlas-pesquisa-squad"
objective: "Construir um squad que pesquisa fontes acadêmicas, sintetiza evidências e gera relatórios auditáveis"
problem: "A revisão de literatura manual é lenta, inconsistente e difícil de rastrear até a fonte"
target_audience: "Pesquisadores e analistas que precisam de sínteses verificáveis com citação por alegação"
expected_outputs:
  - "relatório de síntese com citação por alegação"
  - "matriz de fontes avaliadas"
  - "tabela de evidências determinística"
constraints:
  - "sem credenciais externas no MVP"
  - "toda alegação precisa de fonte rastreável"
integrations:
  - "índices públicos de artigos"
  - "schema de citação JSON"
security_level: low
human_approval_requirements:
  - "aprovar publicação de qualquer relatório"
success_metrics:
  - "100% das alegações com fonte"
  - "tempo de revisão reduzido em 40%"
budget_limit:
  tokens: 200000
  money: 0
  time_minutes: 60
preferred_models:
  - "modelo barato para classificação"
  - "modelo forte para síntese e juízo"
autonomy_level: L2
cynefin_hint: complicated

