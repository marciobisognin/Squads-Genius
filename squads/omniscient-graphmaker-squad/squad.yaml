  - agents/cognitive-boardroom.md
  - agents/relation-sacp-compiler.md
  - agents/venture-synthesis-matrix.md
  - agents/graphmaker-orchestrator.md
  - agents/visual-axiom.md
  - agents/neural-cloning-foundry.md
  - agents/conversion-alchemy.md
  - agents/frictionless-conversion.md
  - agents/turing-architect-guild.md
  - agents/memetic-propagation.md
  - agents/token-latency-governor.md
workflows:
  - workflows/omniscient-v6-5-optimized-flow.yaml
tasks:
  - tasks/01-intake-cynefin.md
  - tasks/02-idbalance-vhm.md
  - tasks/03-taleb-munger-stress-inversion.md
  - tasks/04-boardroom-n-rounds.md
