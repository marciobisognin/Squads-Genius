name: omniscient-graphmaker-squad
version: 6.5.0
status: production-ready-optimized-architecture
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
description: Squad OMNISCIENT v6.5 para converter ideias em blueprints quantitativos e execução multiagente otimizada com IDBALANCE, RELATION/SACP e GRAPHMAKER.
readme_style: dark-neon-layered-architecture
entrypoint: scripts/graphmaker.cjs
frameworks:
  - IDBALANCE: matrizes VHM para identidade heurística e redução de deriva
  - RELATION: SACP para tradução de heurística qualitativa em JSON quantitativo
  - GRAPHMAKER: DAG tático de execução com dependências explícitas
optimization:
  token_governance: true
  latency_budgeting: true
  cache_strategy: state-machine + blueprint fingerprint
  max_self_healing_attempts: 3
agents:
