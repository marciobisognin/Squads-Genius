    severidade: critica
    base_legal: "Art. 92, Lei 14.133/2021 (verificar vigência)"
    vigente_em: "2026-06-17"
    confianca: 0.7
  - id: R02
    descricao: "Instrumento sem base legal identificada"
    condicao: sem_base_legal
    severidade: media
    base_legal: "Princípio da motivação (art. 50, Lei 9.784/1999)"
    vigente_em: "2026-06-17"
    confianca: 0.6
  - id: R03
    descricao: "Valor do instrumento ausente ou não identificado"
    condicao: valor_ausente
    severidade: media
    base_legal: "Controle de execução orçamentária"
    vigente_em: "2026-06-17"
    confianca: 0.6
  - id: R04
    descricao: "Convênio/TED sem menção a plano de trabalho"
    condicao: convenio_sem_plano_trabalho
    severidade: alta
    base_legal: "Decreto 11.531/2023; Decreto 10.426/2020 (verificar vigência)"
    vigente_em: "2026-06-17"
    confianca: 0.6
  - id: R05
