name: pdi-vivo-iffar-squad
title: PDI Vivo IFFar Squad
description: |-
  Equipe multiagente institucional que transforma o Plano de Desenvolvimento Institucional do IFFar em um sistema vivo de planejamento, indicadores, evidências, riscos, pactos por campus, revisão e comunicação, com engine determinística e gates humanos.
version: 1.0.0
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
institutional_context:
  institution: Instituto Federal Farroupilha
  area: Desenvolvimento Institucional / PDI
  scope: |-
    ingestão documental, matriz operacional de metas, indicadores, evidências, riscos, orçamento, pactos por campus, ciclo trimestral, revisão anual e conferência bienal
  default_output: |-
    pacote auditável com base de conhecimento, matriz de metas, dicionário de indicadores, matriz de riscos, relatório trimestral, painel HTML e pacote de consulta pública
  cycles:
  - PDI 2014-2018 (longitudinal)
  - PDI 2019-2026 (histórico/referência)
  - PDI 2027-2034 (ciclo vivo)
metadata:
  readme_style: institutional-intelligence-platform
  domain: institutional-development-planning
  language: pt-BR
  maturity_target: national-reference-platform
data_policy:
  lgpd: |-
    minimização, retenção configurável, mascaramento de dado pessoal e trilha de auditoria
  external_models: proibido enviar dados institucionais a modelos externos sem autorização
  evidence_integrity: hash SHA-256 obrigatório para fontes extraídas e evidências
  human_in_the_loop: toda publicação e repactuação exige revisão humana institucional
normative_bases:
- Lei nº 9.394/1996 (LDB)
- Lei nº 11.892/2008 (criação dos Institutos Federais)
- Lei nº 10.861/2004 (SINAES)
- Decreto nº 9.235/2017 (regulação da educação superior)
- Lei nº 13.709/2018 (LGPD)
- Instrumentos e diretrizes do MEC/INEP para PDI e avaliação institucional
requirements:
- requirements.txt
