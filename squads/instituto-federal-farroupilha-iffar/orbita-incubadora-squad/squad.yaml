name: Órbita Incubadora Squad
slug: orbita-incubadora-squad
version: 1.0.0
type: premium-institutional-incubator-squad
language: pt-BR
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
readme_style: dark-neon-layered-architecture
summary: |-
  Sistema multiagente para diagnosticar, estruturar e operar incubadoras com base em CERNE, Lean Startup, Canvas, TRL, OKR, BSC, inovação aberta e impacto territorial.
principles:
- CERNE como eixo de maturidade institucional, sem alegar certificação automática.
- Validação de mercado por evidências, não por opinião.
- Governança pública, documentação auditável e melhoria contínua.
- Impacto territorial medido por indicadores verificáveis.
agents:
- id: diagnostico-cerne
  file: agents/diagnostico-cerne.md
