- tasks/02-modelagem-e-validacao.md
- tasks/03-maturidade-tecnologica.md
- tasks/04-mentoria-indicadores-impacto.md
- tasks/05-ecossistema-captacao-entrega.md
workflows:
- workflows/incubacao-premium.yaml
templates:
- templates/diagnostico-cerne.md
- templates/business-model-canvas.md
