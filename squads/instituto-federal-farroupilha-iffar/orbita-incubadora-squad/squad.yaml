- scripts/smoke-test.cjs
- scripts/demo-generate-report.cjs
outputs:
- Diagnóstico de maturidade da incubadora
- Plano de Desenvolvimento do Empreendimento
- Mapa de validação de mercado
- Avaliação TRL e stage-gates
- Painel de indicadores e impacto territorial
- Roteiro de mentoria e captação
- Relatório executivo consolidado
disclaimer: |-
  O squad gera minutas, diagnósticos e artefatos de apoio. Decisões institucionais, editais e alegações de conformidade devem passar por revisão humana e jurídica.
