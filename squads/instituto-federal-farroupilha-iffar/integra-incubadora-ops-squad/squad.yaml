name: integra-incubadora-ops-squad
display_name: Integra Incubadora Operations Squad
version: 1.0.0
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
purpose: |
  Squad multi-agente para operacionalização completa da incubadora IDNE (Instituto Federal Farroupilha - Campus Frederico Westphalen). Automatiza o pipeline de startups, avaliação TRL, geração de Lean Canvas, gestão de mentorias, eventos e relatórios institucionais (SEBRAE/FINEP/IFFar).
agents:
- intake-coordinator
- trl-assessor
- lean-canvas-architect
- mentorship-matcher
- event-manager
- compliance-auditor
- report-generator
- dashboard-monitor
workflows:
- startup-pipeline
- trl-assessment
- mentorship-cycle
- event-management
- quarterly-reporting
tasks:
- intake-triagem
- trl-evaluation
- lean-canvas-generation
- mentor-matching
- event-planning
- compliance-check
- sebrae-report
- finep-report
- reitoria-report
- dashboard-update
scripts:
- validate_startup.py
- generate_canvas.py
- match_mentors.py
- schedule_events.py
- compile_report.py
templates:
- lean-canvas-template.md
- trl-assessment-form.md
- mentorship-agreement.md
- event-checklist.md
- sebrae-report-template.md
- finep-report-template.md
