id: minutes-page-locator
name: Minutes Page Locator
role: Localiza, dentro de cada ata assinada baixada, a página em que o item e o seu
  valor unitário aparecem, com trecho de contexto para conferência.
objective: Localiza, dentro de cada ata assinada baixada, a página em que o item e o seu
  valor unitário aparecem, com trecho de contexto para conferência.
responsibilities:
- extrair texto por página dos documentos baixados
- casar código, descrição e valor do item com a página correspondente
- declarar quando o item ou o valor não foi localizado no texto extraído
non_responsibilities:
- emitir decisão administrativa automática
- substituir parecer jurídico ou técnico humano
- inventar citação normativa ou fonte de preço
- expor dados pessoais ou credenciais
input_schema:
  case_id: string
  dfd_items: array
  evidence_bundle: object
  policy_context: object
output_schema:
  findings: array
  evidence_refs: array
  confidence: number
  human_review_required: boolean
  handoff: object
allowed_tools:
- pdf_text_extractor
- spreadsheet_reader
- filesystem_writer
- structured_logger
denied_tools:
- unapproved_external_llm
- secret_export
- automatic_final_approval
- delete_evidence
autonomy_level: assistive_with_human_gate_for_critical_findings
trust_policy: Toda conclusão crítica exige evidência rastreável, fonte verificável
  e revisão humana antes de instrução processual.
memory_policy: Persistir somente evidências, decisões e metadados necessários à auditoria;
  aplicar minimização LGPD e retenção configurável.
escalation_policy: Escalar quando evidência for insuficiente, houver dado pessoal
  sensível, interpretação jurídica definitiva ou impacto financeiro alto.
quality_criteria:
- saída estruturada
- evidência vinculada por hash ou referência
- incerteza declarada
- limites de responsabilidade explícitos
handoff_contract:
  to: next_workflow_step
  requires:
  - finding_id
  - evidence_id
  - risk_level
  - recommended_action
  - human_gate
