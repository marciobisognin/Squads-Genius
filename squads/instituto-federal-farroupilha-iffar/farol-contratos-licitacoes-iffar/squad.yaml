name: farol-contratos-licitacoes-iffar
title: Farol Public Procurement Intelligence Platform
description: |-
  Sistema auditável de inteligência para planejamento, pesquisa de preços, qualidade de especificações, previsão de demanda e governança das contratações públicas do IFFar.
version: 3.2.0
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
institutional_context:
  institution: Instituto Federal Farroupilha
  area: Licitações e Contratos
  scope: |-
    DFD, PCA, ETP, gestão de riscos, pesquisa de preços, TR, saneamento e pacote de instrução processual
  default_output: |-
    processo auditável com achados, evidências, memória de cálculo, gestão de casos, relatório e dashboard
metadata:
  readme_style: institutional-intelligence-platform
  domain: public-procurement-contracts
  language: pt-BR
  maturity_target: national-reference-platform
data_policy:
  lgpd: minimização, retenção configurável, mascaramento e trilha de auditoria
  external_models: proibido enviar dados institucionais a modelos externos sem autorização
  evidence_integrity: hash obrigatório para evidências externas e respostas brutas
normative_bases:
- Lei nº 14.133/2021, art. 23
- IN SEGES/ME nº 65/2021
- IN SEGES nº 58/2022
- IN SEGES nº 81/2022
- Decreto nº 10.947/2022
- Orientações ANPD para Poder Público
- boas práticas TCU para planejamento da contratação
