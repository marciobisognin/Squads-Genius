id: "05_calcular_liberacao_evento"
owner: "a4-engine-calculo"
objective: "Calcular a liberação por evento via engine: 13º por avos, férias proporcional + 1/3, rescisão com multa FGTS (40% sem justa causa / 20% acordo) sobre o saldo do extrato, e encerramento."
inputs:
  - "ContratoParams"
  - "TrabalhadorRecord (avos: admissão/início e data do evento)"
  - "FgtsRecord (saldo / valor base rescisório)"
outputs:
  - "LiberacaoEvento {evento, avos, principal, encargos, total, fonte_saldo}"
acceptance_criteria:
  - "avos por mês com ≥ 15 dias = mês cheio; soma de avos ≤ 12"
  - "multa rescisória calculada sobre o saldo do extrato FGTS (não recalculada por estimativa)"
  - "valor proposto não excede o saldo acumulado da conta para a rubrica"
