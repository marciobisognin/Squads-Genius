<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{title}}</title><style>{{css}}body{overflow:hidden}.stage{width:1920px;height:1080px;position:relative;transform-origin:top left}.scene{position:absolute;inset:0;display:grid;place-items:center;padding:120px;opacity:0}.scene:nth-child(1){animation:show1 12s linear forwards}.scene:nth-child(2){animation:show2 12s linear forwards}.scene:nth-child(3){animation:show3 12s linear forwards}@keyframes show1{0%,28%{opacity:1}34%,100%{opacity:0}}@keyframes show2{0%,30%{opacity:0}36%,62%{opacity:1}68%,100%{opacity:0}}@keyframes show3{0%,64%{opacity:0}70%,100%{opacity:1}}</style></head><body><div class="stage" data-composition-id="executive-briefing" data-start="0" data-duration="12" data-width="1920" data-height="1080"><section id="scene-1" class="scene clip" data-start="0" data-duration="4" data-track-index="1"><div><div class="eyebrow">{{audience}}</div><h1>{{title}}</h1><p>{{thesis}}</p></div></section><section id="scene-2" class="scene clip" data-start="4" data-duration="4" data-track-index="1"><div class="grid">{{kpi_cards}}</div></section><section id="scene-3" class="scene clip" data-start="8" data-duration="4" data-track-index="1"><div class="section"><h2>Roadmap executivo</h2><div class="timeline">{{timeline}}</div></div></section></div></body></html>
