name: prismaframe-executive-cinema-suite
display_name: PrismaFrame Executive Cinema Suite
version: 1.0.0
license: MIT
creator: Marcio Bisognin
instagram: '@marciobisognin'
source_inspirations:
- atlas-visual-reports-squad-v1.2.0
- heygen-com/hyperframes
purpose: |
  Transformar documentos, estudos, diagnósticos e narrativas executivas em materiais premium finais para apresentação, combinando relatório visual, deck executivo, composição animada HTML-native e pacote final sem marcas de processo.
final_product_policy:
