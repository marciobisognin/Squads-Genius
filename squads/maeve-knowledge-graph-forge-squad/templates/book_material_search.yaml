source: "https://1lib.sk/"
search_goal: "descobrir livros e materiais relacionados ao tema da base de conhecimento"
query: ""
collect:
  - title
  - author
  - year
  - subject
  - description_or_metadata
  - source_url
  - legal_access_notes
compliance:
  use_for: "pesquisa bibliográfica, metadados, referência, planejamento de estudo"
  avoid:
    - "automatizar downloads de obras protegidas"
    - "burlar paywalls ou proteções técnicas"
    - "redistribuir conteúdo protegido por direitos autorais"
output_node_type: "reference_material"
