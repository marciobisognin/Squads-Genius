name: farol-iffar-ci

on:
  push:
    paths:
      - 'IFFar-Squads/farol-contratos-licitacoes-iffar/**'
      - '.github/workflows/farol-iffar-ci.yml'
  pull_request:
    paths:
      - 'IFFar-Squads/farol-contratos-licitacoes-iffar/**'
      - '.github/workflows/farol-iffar-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IFFar-Squads/farol-contratos-licitacoes-iffar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install -r requirements-dev.txt
      - name: Smoke test
        run: python scripts/smoke_test.py
      - name: Testes unitários e de pipeline
        run: python -m pytest tests -q
